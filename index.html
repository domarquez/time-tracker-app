<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>Control de Horas</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-800 p-8 rounded-3xl shadow-2xl">

        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">⏱️ Control de Horas</h1>

        <div id="login-screen" class="space-y-5">
            <input id="phone" type="tel" placeholder="Número de Teléfono" class="w-full p-4 bg-gray-700 rounded-2xl text-xl">
            <input id="name" type="text" placeholder="Nombre (opcional)" class="w-full p-4 bg-gray-700 rounded-2xl text-xl">
            
            <button onclick="loginUser()" class="w-full bg-blue-600 py-5 rounded-3xl text-xl font-bold">ENTRAR</button>
            
            <button onclick="loginAsAdmin()" class="w-full bg-purple-600 py-4 rounded-3xl text-lg font-semibold">👑 Administrador</button>

            <button onclick="installPWA()" id="installBtn" class="w-full bg-emerald-600 py-4 rounded-3xl text-sm hidden">
                📲 Instalar App
            </button>
        </div>

        <!-- Pantallas de usuario y admin aquí (copia el resto del código anterior si lo necesitas) -->

    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('installBtn').classList.add('hidden');
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.error);
        }

        // Resto de funciones...
    </script>
</body>
</html>
